# Local Docker override — no nginx, ports exposed directly
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up web api postgres -d

services:
  web:
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_APP_URL=http://localhost:3000

  api:
    ports:
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_APP_URL=http://localhost:3000

  postgres:
    ports:
      - "5433:5432"
